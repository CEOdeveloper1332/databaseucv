<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Ubicaciones — A1 Analytics</title>
	<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" />
	<style>
		@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

		:root {
			--cyan:    #00e5ff;
			--teal:    #00bcd4;
			--green:   #00ff88;
			--magenta: #ff006e;
			--amber:   #ffaa00;
			--red:     #ff2244;
			--bg:      #060d0f;
			--panel:   rgba(6,18,22,0.92);
			--border:  rgba(0,229,255,0.18);
			--text:    rgba(200,240,255,0.9);
			--muted:   rgba(120,180,200,0.6);
			--font-mono: 'IBM Plex Mono', 'Courier New', monospace;
			--font-sans: 'IBM Plex Sans', system-ui, sans-serif;
		}

		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

		html, body {
			height: 100%;
			overflow: hidden;
			background: var(--bg);
			font-family: var(--font-mono);
			color: var(--text);
			-webkit-font-smoothing: antialiased;
		}

		/* ── MAP FULLSCREEN ── */
		#map3d {
			position: fixed;
			inset: 0;
			width: 100vw;
			height: 100vh;
			z-index: 1;
			cursor: grab;
		}
		#map3d.grabbing { cursor: grabbing; }

		/* Oscurecer el mapa base para el look dark */
		.maplibregl-map canvas {
			filter: brightness(0.35) saturate(0.4) hue-rotate(180deg);
		}

		/* ── DARK VIGNETTE OVERLAY ── */
		#vignette {
			position: fixed;
			inset: 0;
			z-index: 2;
			pointer-events: none;
			background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 30%, rgba(4,10,12,0.65) 100%);
		}

		/* ── HEADER ── */
		#header {
			position: fixed;
			top: 0; left: 0; right: 0;
			height: 44px;
			z-index: 100;
			background: rgba(4,10,12,0.94);
			border-bottom: 1px solid var(--border);
			display: flex;
			align-items: center;
			padding: 0 18px;
			gap: 0;
		}

		/* Línea de color en la parte superior */
		#header::before {
			content: '';
			position: absolute;
			top: 0; left: 0; right: 0;
			height: 2px;
			background: linear-gradient(90deg, var(--cyan) 0%, var(--green) 40%, var(--magenta) 100%);
			opacity: 0.8;
		}

		.header-brand {
			font-family: var(--font-mono);
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.22em;
			text-transform: uppercase;
			color: var(--cyan);
			margin-right: 24px;
			white-space: nowrap;
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.header-brand::before {
			content: '';
			display: inline-block;
			width: 7px; height: 7px;
			background: var(--cyan);
			box-shadow: 0 0 8px var(--cyan);
			animation: blink 2s steps(1) infinite;
		}

		@keyframes blink {
			0%,49% { opacity: 1; }
			50%,100% { opacity: 0; }
		}

		.nav-sep {
			width: 1px;
			height: 20px;
			background: var(--border);
			margin: 0 16px;
		}

		.nav-link {
			font-family: var(--font-mono);
			font-size: 10px;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: var(--muted);
			text-decoration: none;
			padding: 4px 10px;
			border: 1px solid transparent;
			transition: all 0.15s;
			cursor: pointer;
			background: none;
		}
		.nav-link:hover { color: var(--cyan); border-color: rgba(0,229,255,0.3); }
		.nav-link.active { color: var(--cyan); border-color: rgba(0,229,255,0.4); background: rgba(0,229,255,0.06); }

		.header-right {
			margin-left: auto;
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.sat-btn {
			font-family: var(--font-mono);
			font-size: 10px;
			letter-spacing: 0.1em;
			text-transform: uppercase;
			background: transparent;
			border: 1px solid rgba(0,229,255,0.3);
			color: var(--muted);
			padding: 4px 12px;
			cursor: pointer;
			transition: all 0.15s;
		}
		.sat-btn:hover, .sat-btn[aria-pressed="true"] {
			color: var(--cyan);
			border-color: var(--cyan);
			background: rgba(0,229,255,0.08);
			box-shadow: 0 0 10px rgba(0,229,255,0.15);
		}

		/* ── PANEL IZQUIERDO ── */
		#side-panel {
			position: fixed;
			top: 44px; left: 0;
			width: 220px;
			max-height: calc(100vh - 44px);
			z-index: 50;
			background: var(--panel);
			border-right: 1px solid var(--border);
			padding: 16px;
			overflow-y: auto;
			display: flex;
			flex-direction: column;
			gap: 14px;
		}

		#side-panel::-webkit-scrollbar { width: 3px; }
		#side-panel::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.3); }

		.panel-section {
			border-bottom: 1px solid var(--border);
			padding-bottom: 12px;
		}

		.panel-section:last-child { border-bottom: none; padding-bottom: 0; }

		.panel-label {
			font-size: 9px;
			letter-spacing: 0.2em;
			text-transform: uppercase;
			color: var(--cyan);
			margin-bottom: 10px;
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.panel-label::before {
			content: '';
			display: inline-block;
			width: 4px; height: 4px;
			background: var(--cyan);
			box-shadow: 0 0 6px var(--cyan);
		}

		/* Stat rows */
		.stat-row {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 6px;
		}

		.stat-key {
			font-size: 9px;
			letter-spacing: 0.12em;
			color: var(--muted);
			text-transform: uppercase;
		}

		.stat-val {
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.04em;
		}

		.stat-val.cyan  { color: var(--cyan);    text-shadow: 0 0 8px var(--cyan); }
		.stat-val.green { color: var(--green);   text-shadow: 0 0 8px var(--green); }
		.stat-val.magenta { color: var(--magenta); text-shadow: 0 0 8px var(--magenta); }
		.stat-val.amber { color: var(--amber);   text-shadow: 0 0 8px var(--amber); }

		/* Mini bar */
		.mini-bar {
			height: 2px;
			background: rgba(255,255,255,0.08);
			margin-bottom: 8px;
			overflow: hidden;
		}

		.mini-bar-fill {
			height: 100%;
			background: linear-gradient(90deg, var(--cyan), var(--green));
			box-shadow: 0 0 6px var(--cyan);
			transition: width 0.8s ease;
		}

		/* Profile list */
		.profile-entry {
			display: flex;
			align-items: center;
			gap: 8px;
			padding: 6px 8px;
			border: 1px solid transparent;
			cursor: pointer;
			transition: all 0.12s;
			margin-bottom: 4px;
		}

		.profile-entry:hover {
			border-color: rgba(0,229,255,0.25);
			background: rgba(0,229,255,0.04);
		}

		.profile-dot {
			width: 6px; height: 6px;
			border-radius: 50%;
			flex-shrink: 0;
		}

		.profile-entry-name {
			font-size: 10px;
			letter-spacing: 0.04em;
			color: var(--text);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.profile-entry-loc {
			font-size: 9px;
			color: var(--muted);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			margin-top: 1px;
		}

		/* ── MARCADORES ── */
		.marker-custom {
			width: 14px; height: 14px;
			border-radius: 50%;
			border: 2px solid var(--cyan);
			background: rgba(0,229,255,0.3);
			box-shadow: 0 0 12px var(--cyan), 0 0 24px rgba(0,229,255,0.4);
			cursor: pointer;
			animation: pulse 2.5s ease-in-out infinite;
			position: relative;
		}

		.marker-custom::after {
			content: '';
			position: absolute;
			inset: -5px;
			border-radius: 50%;
			border: 1px solid rgba(0,229,255,0.25);
			animation: ripple 2.5s ease-out infinite;
		}

		@keyframes pulse {
			0%, 100% { box-shadow: 0 0 8px var(--cyan), 0 0 16px rgba(0,229,255,0.3); }
			50%       { box-shadow: 0 0 16px var(--cyan), 0 0 32px rgba(0,229,255,0.5); }
		}

		@keyframes ripple {
			0%   { transform: scale(1); opacity: 0.6; }
			100% { transform: scale(2.5); opacity: 0; }
		}

		.marker-custom.magenta {
			border-color: var(--magenta);
			background: rgba(255,0,110,0.25);
			box-shadow: 0 0 12px var(--magenta), 0 0 24px rgba(255,0,110,0.35);
		}
		.marker-custom.magenta::after { border-color: rgba(255,0,110,0.25); }
		@keyframes pulse-m {
			0%, 100% { box-shadow: 0 0 8px var(--magenta), 0 0 16px rgba(255,0,110,0.3); }
			50%       { box-shadow: 0 0 18px var(--magenta), 0 0 36px rgba(255,0,110,0.5); }
		}
		.marker-custom.magenta { animation: pulse-m 2.5s ease-in-out infinite; }

		.marker-custom.green {
			border-color: var(--green);
			background: rgba(0,255,136,0.2);
			box-shadow: 0 0 12px var(--green), 0 0 24px rgba(0,255,136,0.3);
			animation: pulse-g 2.5s ease-in-out infinite;
		}
		.marker-custom.green::after { border-color: rgba(0,255,136,0.2); }
		@keyframes pulse-g {
			0%, 100% { box-shadow: 0 0 8px var(--green), 0 0 16px rgba(0,255,136,0.25); }
			50%       { box-shadow: 0 0 18px var(--green), 0 0 36px rgba(0,255,136,0.45); }
		}

		/* ── POPUP PERSONALIZADO ── */
		.maplibregl-popup-content {
			background: rgba(4,14,18,0.97) !important;
			border: 1px solid rgba(0,229,255,0.4) !important;
			border-radius: 0 !important;
			padding: 0 !important;
			box-shadow: 0 0 20px rgba(0,229,255,0.2), 0 4px 24px rgba(0,0,0,0.6) !important;
			font-family: var(--font-mono) !important;
			min-width: 180px;
		}

		.maplibregl-popup-tip {
			border-top-color: rgba(0,229,255,0.4) !important;
		}

		.maplibregl-popup-close-button {
			color: var(--muted) !important;
			font-size: 14px !important;
			padding: 4px 8px !important;
		}

		.popup-inner {
			padding: 12px 14px;
		}

		.popup-header {
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.1em;
			color: var(--cyan);
			text-transform: uppercase;
			margin-bottom: 8px;
			padding-bottom: 8px;
			border-bottom: 1px solid rgba(0,229,255,0.2);
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.popup-header::before {
			content: '';
			display: inline-block;
			width: 5px; height: 5px;
			background: var(--cyan);
			box-shadow: 0 0 6px var(--cyan);
		}

		.popup-profile {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 6px 0;
			border-bottom: 1px solid rgba(255,255,255,0.05);
		}

		.popup-profile:last-child { border-bottom: none; }

		.popup-avatar {
			width: 32px; height: 38px;
			object-fit: cover;
			border: 1px solid rgba(0,229,255,0.35);
			filter: grayscale(30%) brightness(0.85);
			flex-shrink: 0;
		}

		.popup-avatar-placeholder {
			width: 32px; height: 38px;
			background: rgba(0,229,255,0.1);
			border: 1px solid rgba(0,229,255,0.25);
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 13px;
			font-weight: 600;
			color: var(--cyan);
			flex-shrink: 0;
		}

		.popup-name {
			font-size: 11px;
			font-weight: 600;
			color: var(--text);
			letter-spacing: 0.04em;
		}

		.popup-loc {
			font-size: 9px;
			color: var(--muted);
			letter-spacing: 0.08em;
			text-transform: uppercase;
			margin-top: 2px;
		}

		/* ── OVERLAY QUOTA ── */
		#overpassQuota {
			position: fixed;
			bottom: 20px; right: 20px;
			z-index: 100;
			background: rgba(4,10,12,0.92);
			border: 1px solid var(--border);
			padding: 12px 14px;
			min-width: 160px;
		}

		#overpassQuota::before {
			content: 'OVERPASS API';
			display: block;
			font-size: 8px;
			letter-spacing: 0.2em;
			color: var(--cyan);
			margin-bottom: 8px;
			padding-bottom: 6px;
			border-bottom: 1px solid var(--border);
		}

		#overpassQuota div {
			font-size: 10px;
			color: var(--muted);
			letter-spacing: 0.06em;
			margin-bottom: 3px;
		}

		#overpassQuota strong { display: none; }

		/* ── CANVAS ARC LAYER ── */
		#arc-canvas {
			position: fixed;
			inset: 0;
			width: 100vw;
			height: 100vh;
			z-index: 3;
			pointer-events: none;
		}

		/* ── SCAN LINE EFFECT ── */
		#scanlines {
			position: fixed;
			inset: 0;
			z-index: 4;
			pointer-events: none;
			background: repeating-linear-gradient(
				0deg,
				transparent,
				transparent 3px,
				rgba(0,0,0,0.04) 3px,
				rgba(0,0,0,0.04) 4px
			);
			opacity: 0.6;
		}

		/* ── CORNER DECORATIONS ── */
		.corner {
			position: fixed;
			z-index: 10;
			pointer-events: none;
			width: 24px; height: 24px;
		}

		.corner::before, .corner::after {
			content: '';
			position: absolute;
			background: var(--cyan);
			opacity: 0.6;
		}

		.corner-tl { top: 52px; left: 8px; }
		.corner-tl::before { top: 0; left: 0; width: 2px; height: 14px; }
		.corner-tl::after  { top: 0; left: 0; width: 14px; height: 2px; }

		.corner-tr { top: 52px; right: 8px; }
		.corner-tr::before { top: 0; right: 0; width: 2px; height: 14px; }
		.corner-tr::after  { top: 0; right: 0; width: 14px; height: 2px; }

		.corner-bl { bottom: 8px; left: 8px; }
		.corner-bl::before { bottom: 0; left: 0; width: 2px; height: 14px; }
		.corner-bl::after  { bottom: 0; left: 0; width: 14px; height: 2px; }

		.corner-br { bottom: 8px; right: 8px; }
		.corner-br::before { bottom: 0; right: 0; width: 2px; height: 14px; }
		.corner-br::after  { bottom: 0; right: 0; width: 14px; height: 2px; }

		/* ── BOTTOM BAR ── */
		#bottom-bar {
			position: fixed;
			bottom: 0; left: 0; right: 0;
			height: 36px;
			z-index: 50;
			background: rgba(4,10,12,0.92);
			border-top: 1px solid var(--border);
			display: flex;
			align-items: center;
			padding: 0 18px;
			gap: 24px;
		}

		.bottom-stat {
			display: flex;
			align-items: center;
			gap: 8px;
			font-size: 10px;
			letter-spacing: 0.08em;
		}

		.bottom-stat-key {
			color: var(--muted);
			text-transform: uppercase;
		}

		.bottom-stat-val {
			font-weight: 600;
			font-size: 11px;
		}

		.bottom-stat-val.cyan    { color: var(--cyan);    text-shadow: 0 0 8px var(--cyan); }
		.bottom-stat-val.green   { color: var(--green);   text-shadow: 0 0 8px var(--green); }
		.bottom-stat-val.magenta { color: var(--magenta); text-shadow: 0 0 8px var(--magenta); }
		.bottom-stat-val.amber   { color: var(--amber);   text-shadow: 0 0 8px var(--amber); }

		.bottom-sep {
			width: 1px; height: 16px;
			background: var(--border);
		}

		.bottom-right {
			margin-left: auto;
			font-size: 9px;
			color: var(--muted);
			letter-spacing: 0.1em;
			text-transform: uppercase;
		}

		/* ── COORDS DISPLAY ── */
		#coords {
			position: fixed;
			bottom: 44px; right: 20px;
			z-index: 50;
			font-size: 9px;
			letter-spacing: 0.1em;
			color: var(--muted);
			text-transform: uppercase;
		}

		/* ── MAPLIBRE CONTROLS ── */
		.maplibregl-ctrl-group {
			background: rgba(4,14,18,0.92) !important;
			border: 1px solid var(--border) !important;
			border-radius: 0 !important;
			box-shadow: none !important;
		}

		.maplibregl-ctrl-group button {
			background: transparent !important;
			color: var(--muted) !important;
			border-bottom: 1px solid var(--border) !important;
			width: 28px !important; height: 28px !important;
			transition: all 0.1s;
		}

		.maplibregl-ctrl-group button:hover {
			color: var(--cyan) !important;
			background: rgba(0,229,255,0.06) !important;
		}

		.maplibregl-ctrl-group button:last-child { border-bottom: none !important; }

		.maplibregl-ctrl-icon {
			filter: invert(0.7) sepia(1) hue-rotate(160deg) saturate(2) !important;
		}

		.maplibregl-ctrl-attrib {
			display: none !important;
		}

		/* Toggle panel button */
		#togglePanel {
			position: fixed;
			top: 52px; left: 220px;
			z-index: 60;
			width: 20px;
			height: 40px;
			background: rgba(4,14,18,0.92);
			border: 1px solid var(--border);
			border-left: none;
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			color: var(--muted);
			font-size: 10px;
			transition: all 0.15s;
		}

		#togglePanel:hover { color: var(--cyan); }

		#side-panel.collapsed { transform: translateX(-220px); }
		#side-panel.collapsed + #togglePanel { left: 0; }

		/* Scrollbar global */
		::-webkit-scrollbar { width: 3px; }
		::-webkit-scrollbar-track { background: transparent; }
		::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.3); }
	</style>
</head>
<body>

<!-- FONDO MAPA -->
<div id="map3d"></div>

<!-- VIÑETA -->
<div id="vignette"></div>

<!-- CANVAS PARA ARCOS ANIMADOS -->
<canvas id="arc-canvas"></canvas>

<!-- SCANLINES -->
<div id="scanlines"></div>

<!-- DECORACIONES DE ESQUINA -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- HEADER -->
<div id="header">
	<div class="header-brand">A1 ANALYTICS</div>
	<div class="nav-sep"></div>
	<a href="index.html" class="nav-link">← Inicio</a>
	<div class="nav-sep"></div>
	<span class="nav-link active">Ubicaciones</span>

	<div class="header-right">
		<button id="satToggle" class="sat-btn" aria-pressed="false">Satélite</button>
	</div>
</div>

<!-- PANEL IZQUIERDO -->
<div id="side-panel">
	<div class="panel-section">
		<div class="panel-label">Estado del Sistema</div>
		<div class="stat-row">
			<span class="stat-key">Perfiles</span>
			<span class="stat-val cyan" id="statTotal">0</span>
		</div>
		<div class="mini-bar"><div class="mini-bar-fill" id="barTotal" style="width:0%"></div></div>
		<div class="stat-row">
			<span class="stat-key">Geolocalizados</span>
			<span class="stat-val green" id="statGeo">0</span>
		</div>
		<div class="mini-bar"><div class="mini-bar-fill" id="barGeo" style="width:0%;background:linear-gradient(90deg,var(--green),var(--cyan))"></div></div>
		<div class="stat-row">
			<span class="stat-key">Sin ubicación</span>
			<span class="stat-val magenta" id="statNoGeo">0</span>
		</div>
	</div>

	<div class="panel-section">
		<div class="panel-label">Registros Activos</div>
		<div id="profileList">
			<div style="font-size:10px;color:var(--muted);letter-spacing:0.06em;">Sin datos cargados</div>
		</div>
	</div>

	<div class="panel-section">
		<div class="panel-label">Coordenadas</div>
		<div class="stat-row">
			<span class="stat-key">LAT</span>
			<span class="stat-val amber" id="dispLat">—</span>
		</div>
		<div class="stat-row">
			<span class="stat-key">LNG</span>
			<span class="stat-val amber" id="dispLng">—</span>
		</div>
		<div class="stat-row">
			<span class="stat-key">Zoom</span>
			<span class="stat-val cyan" id="dispZoom">—</span>
		</div>
	</div>
</div>

<!-- TOGGLE PANEL -->
<div id="togglePanel" title="Ocultar panel">‹</div>

<!-- OVERLAY OVERPASS -->
<div id="overpassQuota" aria-live="polite">
	<div id="quotaUsage">Usos: 0 / 10</div>
	<div id="quotaReset">Reset: --:--</div>
	<div id="quotaLast">Última: nunca</div>
</div>

<!-- BARRA INFERIOR -->
<div id="bottom-bar">
	<div class="bottom-stat">
		<span class="bottom-stat-key">Sistema</span>
		<span class="bottom-stat-val green">ACTIVO</span>
	</div>
	<div class="bottom-sep"></div>
	<div class="bottom-stat">
		<span class="bottom-stat-key">Mapa</span>
		<span class="bottom-stat-val cyan">OpenStreetMap</span>
	</div>
	<div class="bottom-sep"></div>
	<div class="bottom-stat">
		<span class="bottom-stat-key">Marcadores</span>
		<span class="bottom-stat-val cyan" id="markerCount">0</span>
	</div>
	<div class="bottom-sep"></div>
	<div class="bottom-stat">
		<span class="bottom-stat-key">Modo</span>
		<span class="bottom-stat-val amber" id="modeLabel">PLANO</span>
	</div>
	<div class="bottom-right" id="clockDisplay"></div>
</div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
<script src="main.js"></script>

<script>
(function(){
	// ── RELOJ ──
	function updateClock() {
		const now = new Date();
		const t = now.toISOString().replace('T',' ').substring(0,19) + ' UTC';
		document.getElementById('clockDisplay').textContent = t;
	}
	updateClock();
	setInterval(updateClock, 1000);

	// ── TOGGLE PANEL ──
	const panel = document.getElementById('side-panel');
	const toggleBtn = document.getElementById('togglePanel');
	toggleBtn.addEventListener('click', () => {
		panel.classList.toggle('collapsed');
		toggleBtn.textContent = panel.classList.contains('collapsed') ? '›' : '‹';
	});

	// ── MAPA ──
	const map3d = new maplibregl.Map({
		container: 'map3d',
		style: 'https://demotiles.maplibre.org/style.json',
		center: [-75, -9],
		zoom: 4,
		pitch: 0,
		bearing: 0,
		antialias: true,
		interactive: true
	});

	map3d.addControl(new maplibregl.NavigationControl(), 'bottom-left');

	const mapEl = document.getElementById('map3d');

	// Oscurecer el mapa con filtro CSS
	map3d.on('load', () => {
		const canvas = mapEl.querySelector('canvas');
		if (canvas) {
			canvas.style.filter = 'brightness(0.28) saturate(0.5) hue-rotate(185deg)';
		}
	});

	map3d.on('mousedown', () => mapEl.classList.add('grabbing'));
	map3d.on('mouseup',   () => mapEl.classList.remove('grabbing'));
	map3d.on('dragend',   () => mapEl.classList.remove('grabbing'));

	// Actualizar coordenadas en tiempo real
	map3d.on('mousemove', (e) => {
		document.getElementById('dispLat').textContent = e.lngLat.lat.toFixed(4);
		document.getElementById('dispLng').textContent = e.lngLat.lng.toFixed(4);
	});

	map3d.on('zoom', () => {
		document.getElementById('dispZoom').textContent = map3d.getZoom().toFixed(1);
	});

	// ── CANVAS ARCOS ──
	const arcCanvas = document.getElementById('arc-canvas');
	const ctx = arcCanvas.getContext('2d');
	const arcs = [];
	let animFrame;

	function resizeCanvas() {
		arcCanvas.width  = window.innerWidth;
		arcCanvas.height = window.innerHeight;
	}
	resizeCanvas();
	window.addEventListener('resize', resizeCanvas);

	// Proyectar coords a píxeles
	function project(lng, lat) {
		try {
			const p = map3d.project([lng, lat]);
			return { x: p.x, y: p.y };
		} catch(e) { return null; }
	}

	// Paleta de arcos
	const ARC_COLORS = [
		{ r:0,   g:229, b:255 }, // cyan
		{ r:0,   g:255, b:136 }, // green
		{ r:255, g:0,   b:110 }, // magenta
		{ r:255, g:170, b:0   }, // amber
	];

	function createArc(from, to) {
		const col = ARC_COLORS[Math.floor(Math.random() * ARC_COLORS.length)];
		return {
			from, to,
			progress: 0,
			speed: 0.004 + Math.random() * 0.006,
			color: col,
			alpha: 0,
			trail: [],
			maxTrail: 40 + Math.floor(Math.random() * 30),
		};
	}

	function spawnArcs(points) {
		if (points.length < 2) return;
		for (let i = 0; i < Math.min(points.length * 2, 12); i++) {
			const a = points[Math.floor(Math.random() * points.length)];
			const b = points[Math.floor(Math.random() * points.length)];
			if (a !== b) arcs.push(createArc(a, b));
		}
	}

	function drawArcs() {
		ctx.clearRect(0, 0, arcCanvas.width, arcCanvas.height);

		for (let i = arcs.length - 1; i >= 0; i--) {
			const arc = arcs[i];
			arc.progress += arc.speed;

			// Fade in/out
			if (arc.progress < 0.1) arc.alpha = arc.progress / 0.1;
			else if (arc.progress > 0.85) arc.alpha = (1 - arc.progress) / 0.15;
			else arc.alpha = 1;

			if (arc.progress >= 1) { arcs.splice(i, 1); continue; }

			const pA = project(arc.from.lng, arc.from.lat);
			const pB = project(arc.to.lng,   arc.to.lat);
			if (!pA || !pB) continue;

			// Control point para la curva (elevado)
			const mx = (pA.x + pB.x) / 2;
			const my = (pA.y + pB.y) / 2;
			const dist = Math.hypot(pB.x - pA.x, pB.y - pA.y);
			const cp = { x: mx, y: my - dist * 0.35 };

			// Punto actual en la curva bezier
			const t = arc.progress;
			const bx = (1-t)*(1-t)*pA.x + 2*(1-t)*t*cp.x + t*t*pB.x;
			const by = (1-t)*(1-t)*pA.y + 2*(1-t)*t*cp.y + t*t*pB.y;

			// Acumular trail
			arc.trail.push({ x: bx, y: by });
			if (arc.trail.length > arc.maxTrail) arc.trail.shift();

			// Dibujar trail
			if (arc.trail.length > 1) {
				for (let j = 1; j < arc.trail.length; j++) {
					const ta = j / arc.trail.length;
					const { r, g, b } = arc.color;
					ctx.beginPath();
					ctx.moveTo(arc.trail[j-1].x, arc.trail[j-1].y);
					ctx.lineTo(arc.trail[j].x,   arc.trail[j].y);
					ctx.strokeStyle = `rgba(${r},${g},${b},${ta * arc.alpha * 0.7})`;
					ctx.lineWidth = ta * 1.5;
					ctx.stroke();
				}

				// Glow en la cabeza
				const { r, g, b } = arc.color;
				ctx.beginPath();
				ctx.arc(bx, by, 3, 0, Math.PI * 2);
				ctx.fillStyle = `rgba(${r},${g},${b},${arc.alpha})`;
				ctx.fill();

				const grad = ctx.createRadialGradient(bx, by, 0, bx, by, 8);
				grad.addColorStop(0, `rgba(${r},${g},${b},${arc.alpha * 0.5})`);
				grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
				ctx.beginPath();
				ctx.arc(bx, by, 8, 0, Math.PI * 2);
				ctx.fillStyle = grad;
				ctx.fill();
			}
		}

		animFrame = requestAnimationFrame(drawArcs);
	}

	drawArcs();

	// ── SATÉLITE ──
	const satBtn = document.getElementById('satToggle');
	const SAT_SOURCE_ID = 'esri-sat-source';
	const SAT_LAYER_ID  = 'esri-sat-layer';

	async function addSatLayer() {
		if (!map3d.getSource(SAT_SOURCE_ID)) {
			map3d.addSource(SAT_SOURCE_ID, {
				type: 'raster',
				tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
				tileSize: 256, maxzoom: 19
			});
		}
		if (!map3d.getLayer(SAT_LAYER_ID)) {
			map3d.addLayer({ id: SAT_LAYER_ID, type: 'raster', source: SAT_SOURCE_ID,
				paint: { 'raster-opacity': 1.0, 'raster-brightness-max': 0.45, 'raster-saturation': -0.3 }
			});
		} else {
			map3d.setLayoutProperty(SAT_LAYER_ID, 'visibility', 'visible');
		}
		document.getElementById('modeLabel').textContent = 'SATÉLITE';
	}

	function hideSatLayer() {
		try { map3d.setLayoutProperty(SAT_LAYER_ID, 'visibility', 'none'); } catch(e){}
		document.getElementById('modeLabel').textContent = 'PLANO';
	}

	satBtn.addEventListener('click', async () => {
		const on = satBtn.getAttribute('aria-pressed') === 'true';
		if (on) { hideSatLayer(); satBtn.setAttribute('aria-pressed','false'); satBtn.textContent='Satélite'; }
		else { await addSatLayer(); satBtn.setAttribute('aria-pressed','true'); satBtn.textContent='Mapa'; }
	});

	map3d.on('styledata', () => {
		if (satBtn.getAttribute('aria-pressed') === 'true') setTimeout(addSatLayer, 200);
	});

	// ── MARCADORES ──
	const markers = new Map();
	const markerPoints = [];

	function pickMarkerClass(idx) {
		const classes = ['', 'magenta', 'green'];
		return classes[idx % classes.length];
	}

	function escapeHtml(s) {
		return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]);
	}

	window.addOrUpdate3DMarker = function(id, coords, html) {
		if (!coords || typeof coords.lat !== 'number') return;
		const key = String(id);
		if (markers.has(key)) {
			try { markers.get(key).setLngLat([coords.lng, coords.lat]); } catch(e){}
			return;
		}
		const el = document.createElement('div');
		el.className = 'marker-custom';
		const marker = new maplibregl.Marker(el).setLngLat([coords.lng, coords.lat]).addTo(map3d);
		if (html) marker.setPopup(new maplibregl.Popup({offset:18}).setHTML(html));
		markers.set(key, marker);
		markerPoints.push({ lng: coords.lng, lat: coords.lat });
		spawnArcs(markerPoints);
		document.getElementById('markerCount').textContent = markers.size;
	};

	window.addOrUpdateGroupMarker = function(locationKey, coords, profiles) {
		if (!coords || typeof coords.lat !== 'number') return;
		const key = 'group:' + String(locationKey);

		const items = profiles.map(p => {
			const av = p.photo && (typeof p.photo === 'string' ? p.photo : p.photo?.url);
			const nm = escapeHtml(((p.firstName||'')+' '+(p.lastName||'')).trim() || p.email || 'Usuario');
			const lo = escapeHtml(p.location || p.locality || '');
			const avatarHtml = av
				? `<img class="popup-avatar" src="${escapeHtml(av)}" alt="${nm}">`
				: `<div class="popup-avatar-placeholder">${nm.charAt(0).toUpperCase()}</div>`;
			return `<div class="popup-profile">${avatarHtml}<div><div class="popup-name">${nm}</div>${lo ? `<div class="popup-loc">${lo}</div>` : ''}</div></div>`;
		}).join('');

		const html = `<div class="popup-inner"><div class="popup-header">${profiles.length} registro${profiles.length!==1?'s':''}</div>${items}</div>`;

		if (markers.has(key)) {
			try { const m = markers.get(key); m.setLngLat([coords.lng, coords.lat]); m.setPopup(new maplibregl.Popup({offset:18}).setHTML(html)); } catch(e){}
			return;
		}

		const idx = markers.size;
		const el = document.createElement('div');
		el.className = 'marker-custom ' + pickMarkerClass(idx);
		const marker = new maplibregl.Marker(el).setLngLat([coords.lng, coords.lat]).addTo(map3d);
		marker.setPopup(new maplibregl.Popup({offset:18}).setHTML(html));
		markers.set(key, marker);
		markerPoints.push({ lng: coords.lng, lat: coords.lat });
		spawnArcs(markerPoints);
		document.getElementById('markerCount').textContent = markers.size;
	};

	window.clear3DMarkers = function() { markers.forEach(m=>m.remove()); markers.clear(); markerPoints.length=0; document.getElementById('markerCount').textContent='0'; };

	window.fit3DMarkers = function() {
		if (!markers.size) return;
		const bounds = new maplibregl.LngLatBounds();
		markers.forEach(m=>bounds.extend(m.getLngLat()));
		try { map3d.fitBounds(bounds, { padding: 60, maxZoom: 14 }); } catch(e){}
	};

	window._map3d = map3d;

	// ── CARGAR PERFILES ──
	function loadProfilesFromStorage() {
		try {
			const profiles = JSON.parse(localStorage.getItem('profiles')) || [];
			document.getElementById('statTotal').textContent  = profiles.length;
			const geo = profiles.filter(p => p.location || p.locality);
			document.getElementById('statGeo').textContent    = geo.length;
			document.getElementById('statNoGeo').textContent  = profiles.length - geo.length;
			const pct = profiles.length ? Math.round(geo.length/profiles.length*100) : 0;
			document.getElementById('barTotal').style.width   = '100%';
			document.getElementById('barGeo').style.width     = pct + '%';

			// Lista de perfiles en el panel
			const listEl = document.getElementById('profileList');
			if (!profiles.length) {
				listEl.innerHTML = '<div style="font-size:10px;color:var(--muted);letter-spacing:0.06em;">Sin datos cargados</div>';
				return;
			}
			const colors = ['var(--cyan)','var(--green)','var(--magenta)','var(--amber)'];
			listEl.innerHTML = profiles.slice(0,12).map((p,i) => {
				const nm = escapeHtml(((p.firstName||'')+' '+(p.lastName||'')).trim() || p.email || '—');
				const lo = escapeHtml(p.location || p.locality || '—');
				return `<div class="profile-entry">
					<div class="profile-dot" style="background:${colors[i%colors.length]};box-shadow:0 0 6px ${colors[i%colors.length]}"></div>
					<div><div class="profile-entry-name">${nm}</div><div class="profile-entry-loc">${lo}</div></div>
				</div>`;
			}).join('');
		} catch(e) { console.error(e); }
	}

	map3d.on('load', loadProfilesFromStorage);

	// Spawn de arcos periódico
	setInterval(() => {
		if (markerPoints.length >= 2 && arcs.length < 18) {
			spawnArcs(markerPoints);
		}
	}, 2500);

})();
</script>
</body>
</html>
