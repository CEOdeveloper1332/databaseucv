<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ubicaciones — A1 Analytics</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root {
  --cyan:#00e5ff; --green:#00ff88; --magenta:#ff006e;
  --amber:#ffaa00; --red:#ff2244;
  --bg:#060d0f; --panel:rgba(6,18,22,0.95);
  --border:rgba(0,229,255,0.18); --text:rgba(200,240,255,0.9);
  --muted:rgba(120,180,200,0.6);
  --font-mono:'IBM Plex Mono','Courier New',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--font-mono);color:var(--text);-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
#header{position:fixed;top:0;left:0;right:0;height:44px;z-index:100;background:rgba(4,10,12,0.96);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:0}
#header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan) 0%,var(--green) 40%,var(--magenta) 100%);opacity:.8}
.header-brand{font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--cyan);margin-right:24px;white-space:nowrap;display:flex;align-items:center;gap:8px}
.header-brand::before{content:'';display:inline-block;width:7px;height:7px;background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:blink 2s steps(1) infinite}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
.nav-sep{width:1px;height:20px;background:var(--border);margin:0 16px}
.nav-link{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:4px 10px;border:1px solid transparent;transition:all .15s;cursor:pointer;background:none}
.nav-link:hover{color:var(--cyan);border-color:rgba(0,229,255,.3)}
.nav-link.active{color:var(--cyan);border-color:rgba(0,229,255,.4);background:rgba(0,229,255,.06)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}

/* ── PANEL ── */
#side-panel{position:fixed;top:44px;left:0;width:220px;max-height:calc(100vh - 80px);z-index:50;background:var(--panel);border-right:1px solid var(--border);padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;transition:transform .25s ease}
#side-panel.collapsed{transform:translateX(-220px)}
#side-panel::-webkit-scrollbar{width:3px}
#side-panel::-webkit-scrollbar-thumb{background:rgba(0,229,255,.3)}
.panel-section{border-bottom:1px solid var(--border);padding-bottom:12px}
.panel-section:last-child{border-bottom:none;padding-bottom:0}
.panel-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--cyan);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.panel-label::before{content:'';display:inline-block;width:4px;height:4px;background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.stat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.stat-key{font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.stat-val{font-size:11px;font-weight:600;letter-spacing:.04em}
.v-cyan   {color:var(--cyan);  text-shadow:0 0 8px var(--cyan)}
.v-green  {color:var(--green); text-shadow:0 0 8px var(--green)}
.v-magenta{color:var(--magenta);text-shadow:0 0 8px var(--magenta)}
.v-amber  {color:var(--amber); text-shadow:0 0 8px var(--amber)}
.mini-bar{height:2px;background:rgba(255,255,255,.08);margin-bottom:8px;overflow:hidden}
.mini-bar-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));box-shadow:0 0 6px var(--cyan);transition:width .8s ease}
.profile-entry{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid transparent;cursor:pointer;transition:all .12s;margin-bottom:4px}
.profile-entry:hover{border-color:rgba(0,229,255,.25);background:rgba(0,229,255,.04)}
.profile-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.profile-entry-name{font-size:10px;letter-spacing:.04em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.profile-entry-loc{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

/* ── TOGGLE ── */
#togglePanel{position:fixed;top:52px;left:220px;z-index:60;width:20px;height:40px;background:rgba(4,14,18,.92);border:1px solid var(--border);border-left:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:10px;transition:all .15s}
#togglePanel:hover{color:var(--cyan)}
#side-panel.collapsed~#togglePanel{left:0}

/* ── MAPA ── */
#map-container{position:fixed;inset:0;top:44px;bottom:36px;left:220px;overflow:hidden;cursor:grab;background:#050c10;transition:left .25s ease;user-select:none}
#map-container.panel-hidden{left:0}
#map-container:active{cursor:grabbing}
#map-container::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:10;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);opacity:.5}
#vignette{position:absolute;inset:0;z-index:9;pointer-events:none;background:radial-gradient(ellipse 70% 70% at 50% 50%,transparent 30%,rgba(4,10,12,.5) 100%)}
#svg-stage{position:absolute;transform-origin:0 0;will-change:transform}
#peru-svg{display:block;overflow:visible}

/* departamentos */
.dept{fill:#0d2530;stroke:rgba(0,229,255,.3);stroke-width:.6;cursor:pointer;transition:fill .18s}
.dept:hover{fill:#152f3a;stroke:rgba(0,229,255,.7)}
.dept-label{font-family:var(--font-mono);font-size:7px;fill:rgba(0,229,255,.35);pointer-events:none;text-anchor:middle}

/* ── ARC CANVAS ── */
#arc-canvas{position:absolute;inset:0;pointer-events:none;z-index:5}

/* ── MARCADORES ── */
.mk{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:20}
.mk-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--cyan);background:rgba(0,229,255,.3);box-shadow:0 0 10px var(--cyan);animation:pulse 2.5s ease-in-out infinite;transition:transform .15s}
.mk:hover .mk-dot{transform:scale(1.5)}
.mk-dot::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:1px solid rgba(0,229,255,.2);animation:ripple 2.5s ease-out infinite}
.mk.mg .mk-dot{border-color:var(--magenta);background:rgba(255,0,110,.25);box-shadow:0 0 10px var(--magenta);animation:pulse-m 2.5s ease-in-out infinite}
.mk.mg .mk-dot::after{border-color:rgba(255,0,110,.2)}
.mk.gn .mk-dot{border-color:var(--green);background:rgba(0,255,136,.2);box-shadow:0 0 10px var(--green);animation:pulse-g 2.5s ease-in-out infinite}
.mk.gn .mk-dot::after{border-color:rgba(0,255,136,.2)}
@keyframes pulse  {0%,100%{box-shadow:0 0 8px var(--cyan),0 0 14px rgba(0,229,255,.3)}50%{box-shadow:0 0 14px var(--cyan),0 0 28px rgba(0,229,255,.5)}}
@keyframes pulse-m{0%,100%{box-shadow:0 0 8px var(--magenta),0 0 14px rgba(255,0,110,.3)}50%{box-shadow:0 0 14px var(--magenta),0 0 28px rgba(255,0,110,.5)}}
@keyframes pulse-g{0%,100%{box-shadow:0 0 8px var(--green),0 0 14px rgba(0,255,136,.25)}50%{box-shadow:0 0 14px var(--green),0 0 28px rgba(0,255,136,.45)}}
@keyframes ripple {0%{transform:scale(1);opacity:.6}100%{transform:scale(2.5);opacity:0}}

/* ── POPUP ── */
#popup{position:fixed;z-index:200;background:rgba(4,14,18,.97);border:1px solid rgba(0,229,255,.4);box-shadow:0 0 20px rgba(0,229,255,.2),0 4px 24px rgba(0,0,0,.7);min-width:200px;max-width:280px;display:none;font-family:var(--font-mono)}
#popup.show{display:block}
.pu-inner{padding:12px 14px}
.pu-header{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--cyan);text-transform:uppercase;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(0,229,255,.2);display:flex;align-items:center;gap:6px}
.pu-header::before{content:'';display:inline-block;width:5px;height:5px;background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.pu-row{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.pu-row:last-child{border-bottom:none}
.pu-av{width:30px;height:30px;border-radius:50%;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.25);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--cyan);flex-shrink:0;overflow:hidden}
.pu-av img{width:100%;height:100%;object-fit:cover}
.pu-name{font-size:11px;font-weight:600;color:var(--text);letter-spacing:.04em}
.pu-loc{font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
#popupClose{position:absolute;top:5px;right:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;font-family:var(--font-mono)}
#popupClose:hover{color:var(--cyan)}

/* ── ZOOM CONTROLS ── */
#zoom-ctrl{position:fixed;bottom:48px;right:16px;z-index:80;display:flex;flex-direction:column;gap:4px}
.z-btn{width:28px;height:28px;background:rgba(4,14,18,.92);border:1px solid var(--border);color:var(--muted);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-family:var(--font-mono);line-height:1}
.z-btn:hover{color:var(--cyan);border-color:var(--cyan);background:rgba(0,229,255,.06)}

/* ── BOTTOM BAR ── */
#bottom-bar{position:fixed;bottom:0;left:0;right:0;height:36px;z-index:50;background:rgba(4,10,12,.92);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:24px}
.b-stat{display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:.08em}
.b-key{color:var(--muted);text-transform:uppercase}
.b-val{font-weight:600;font-size:11px}
.b-sep{width:1px;height:16px;background:var(--border)}
.b-right{margin-left:auto;font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

/* ── CORNERS ── */
.corner{position:fixed;z-index:10;pointer-events:none;width:24px;height:24px}
.corner::before,.corner::after{content:'';position:absolute;background:var(--cyan);opacity:.45}
.ctlx{top:52px;left:8px}.ctlx::before{top:0;left:0;width:2px;height:14px}.ctlx::after{top:0;left:0;width:14px;height:2px}
.ctrx{top:52px;right:8px}.ctrx::before{top:0;right:0;width:2px;height:14px}.ctrx::after{top:0;right:0;width:14px;height:2px}
.cblx{bottom:44px;left:8px}.cblx::before{bottom:0;left:0;width:2px;height:14px}.cblx::after{bottom:0;left:0;width:14px;height:2px}
.cbrx{bottom:44px;right:8px}.cbrx::before{bottom:0;right:0;width:2px;height:14px}.cbrx::after{bottom:0;right:0;width:14px;height:2px}

/* ── LOADING ── */
#loading{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .5s}
#loading.out{opacity:0;pointer-events:none}
.ld-text{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--cyan)}
.ld-sub{font-size:9px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
.ld-bar{width:200px;height:2px;background:rgba(0,229,255,.15);overflow:hidden}
.ld-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));animation:ld 1.5s ease-in-out infinite}
@keyframes ld{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}

/* ── NO-GEO BADGE ── */
.badge-nf{font-size:9px;letter-spacing:.1em;color:var(--amber);border:1px solid rgba(255,170,0,.3);padding:1px 6px;display:inline-block;margin-top:2px}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="ld-text">A1 Analytics</div>
  <div class="ld-sub">Cargando mapa de Perú</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<!-- CORNERS -->
<div class="corner ctlx"></div><div class="corner ctrx"></div>
<div class="corner cblx"></div><div class="corner cbrx"></div>

<!-- HEADER -->
<div id="header">
  <div class="header-brand">A1 ANALYTICS</div>
  <div class="nav-sep"></div>
  <a href="index.html" class="nav-link">← Inicio</a>
  <div class="nav-sep"></div>
  <span class="nav-link active">Ubicaciones</span>
  <div class="header-right">
    <span style="font-size:9px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase">PERÚ · SVG · OFFLINE</span>
  </div>
</div>

<!-- PANEL -->
<div id="side-panel">
  <div class="panel-section">
    <div class="panel-label">Estado del Sistema</div>
    <div class="stat-row"><span class="stat-key">Perfiles</span><span class="stat-val v-cyan" id="statTotal">0</span></div>
    <div class="mini-bar"><div class="mini-bar-fill" id="barTotal" style="width:0%"></div></div>
    <div class="stat-row"><span class="stat-key">Geolocalizados</span><span class="stat-val v-green" id="statGeo">0</span></div>
    <div class="mini-bar"><div class="mini-bar-fill" id="barGeo" style="width:0%;background:linear-gradient(90deg,var(--green),var(--cyan))"></div></div>
    <div class="stat-row"><span class="stat-key">Sin ubicación</span><span class="stat-val v-magenta" id="statNoGeo">0</span></div>
  </div>
  <div class="panel-section">
    <div class="panel-label">Registros Activos</div>
    <div id="profileList"><div style="font-size:10px;color:var(--muted)">Cargando...</div></div>
  </div>
  <div class="panel-section">
    <div class="panel-label">Mapa</div>
    <div class="stat-row"><span class="stat-key">Región</span><span class="stat-val v-cyan">PERÚ</span></div>
    <div class="stat-row"><span class="stat-key">Marcadores</span><span class="stat-val v-green" id="markerCount">0</span></div>
    <div class="stat-row"><span class="stat-key">Localidades DB</span><span class="stat-val v-amber" id="geoDbCount">—</span></div>
    <div class="stat-row"><span class="stat-key">Zoom</span><span class="stat-val v-cyan" id="zoomVal">1.0x</span></div>
  </div>
</div>

<div id="togglePanel">‹</div>

<!-- MAPA -->
<div id="map-container">
  <div id="vignette"></div>
  <canvas id="arc-canvas"></canvas>
  <div id="svg-stage">
    <!-- SVG se inyecta por JS -->
  </div>
</div>

<!-- POPUP -->
<div id="popup">
  <button id="popupClose">✕</button>
  <div class="pu-inner" id="popupContent"></div>
</div>

<!-- ZOOM -->
<div id="zoom-ctrl">
  <button class="z-btn" id="zIn">+</button>
  <button class="z-btn" id="zOut">−</button>
  <button class="z-btn" id="zFit" style="font-size:9px;letter-spacing:0">FIT</button>
</div>

<!-- BOTTOM BAR -->
<div id="bottom-bar">
  <div class="b-stat"><span class="b-key">Sistema</span><span class="b-val v-green">ACTIVO</span></div>
  <div class="b-sep"></div>
  <div class="b-stat"><span class="b-key">Motor</span><span class="b-val v-cyan">SVG · Sin API</span></div>
  <div class="b-sep"></div>
  <div class="b-stat"><span class="b-key">Marcadores</span><span class="b-val v-cyan" id="markerCountBar">0</span></div>
  <div class="b-sep"></div>
  <div class="b-stat"><span class="b-key">Geocoder</span><span class="b-val v-green">LOCAL</span></div>
  <div class="b-right" id="clockDisplay"></div>
</div>

// ── ÍNDICE DE GEOCODING ────────────────────────────────────────────────────
// Construido al cargar: hashmap por prefijo de 3 letras → O(1) lookup
const GEO_IDX = {};

(function buildIndex() {
  for (let i = 0; i < PERU_GEO.length; i++) {
    const [nombre, lat, lng, tipo, depto] = PERU_GEO[i];
    const entry = { nombre, lat, lng, tipo, depto, i };
    // índice exacto
    if (!GEO_IDX[nombre]) GEO_IDX[nombre] = entry;
    // índice por primeras 3 letras (para match parcial rápido)
    const p3 = nombre.slice(0, 3);
    if (!GEO_IDX['__p__' + p3]) GEO_IDX['__p__' + p3] = [];
    GEO_IDX['__p__' + p3].push(entry);
  }
})();

function nrm(s) {
  return String(s || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
}

function geocodeLocal(city, country) {
  if (!city) return null;
  const c = nrm(city);
  const co = nrm(country || '');

  // Rechazar si el país no es Perú (cuando se especifica)
  if (co && !['peru', 'perú', 'pe'].includes(co)) return null;

  // 1. Exacto
  if (GEO_IDX[c]) return GEO_IDX[c];

  // 2. Prefijo 3 letras → buscar starts-with
  const p3 = c.slice(0, 3);
  const bucket = GEO_IDX['__p__' + p3] || [];
  for (const e of bucket) {
    if (e.nombre.startsWith(c) || c.startsWith(e.nombre)) return e;
  }

  // 3. Scan lineal con includes (fallback)
  for (let i = 0; i < PERU_GEO.length; i++) {
    const n = PERU_GEO[i][0];
    if (n.includes(c) || c.includes(n)) return { nombre: n, lat: PERU_GEO[i][1], lng: PERU_GEO[i][2], tipo: PERU_GEO[i][3], depto: PERU_GEO[i][4] };
  }

  return null;
}

// ── PROYECCIÓN SVG ─────────────────────────────────────────────────────────
// Bounding box real de Perú
const LAT_MAX = -0.038, LAT_MIN = -18.35;
const LNG_MIN = -81.33, LNG_MAX = -68.65;
const SVG_W = 680, SVG_H = 950;

function project(lat, lng) {
  const x = (lng - LNG_MIN) / (LNG_MAX - LNG_MIN) * SVG_W;
  const y = (LAT_MAX - lat) / (LAT_MAX - LAT_MIN) * SVG_H;
  return [x, y];
}

// ── CONSTRUIR SVG DEL MAPA ─────────────────────────────────────────────────
function buildMapSVG() {
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.id = 'peru-svg';
  svg.setAttribute('viewBox', `0 0 ${SVG_W} ${SVG_H}`);
  svg.setAttribute('width', SVG_W);
  svg.setAttribute('height', SVG_H);

  // Fondo
  const bg = document.createElementNS(NS, 'rect');
  bg.setAttribute('width', SVG_W); bg.setAttribute('height', SVG_H);
  bg.setAttribute('fill', '#040b0e');
  svg.appendChild(bg);

  // Grid sutil
  for (let x = 0; x <= SVG_W; x += 68) {
    const l = document.createElementNS(NS, 'line');
    l.setAttribute('x1', x); l.setAttribute('y1', 0);
    l.setAttribute('x2', x); l.setAttribute('y2', SVG_H);
    l.setAttribute('stroke', 'rgba(0,229,255,0.04)'); l.setAttribute('stroke-width', '0.5');
    svg.appendChild(l);
  }
  for (let y = 0; y <= SVG_H; y += 95) {
    const l = document.createElementNS(NS, 'line');
    l.setAttribute('x1', 0); l.setAttribute('y1', y);
    l.setAttribute('x2', SVG_W); l.setAttribute('y2', y);
    l.setAttribute('stroke', 'rgba(0,229,255,0.04)'); l.setAttribute('stroke-width', '0.5');
    svg.appendChild(l);
  }

  // Departamentos
  const fills = ['#0d2530','#0c2932','#0e2b36','#0b2630'];

  DEPTS.forEach((d, i) => {
    const points = d.pts.map(([lat, lng]) => {
      const [x, y] = project(lat, lng);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');

    const poly = document.createElementNS(NS, 'polygon');
    poly.setAttribute('points', points);
    poly.setAttribute('fill', fills[i % fills.length]);
    poly.setAttribute('stroke', 'rgba(0,229,255,0.3)');
    poly.setAttribute('stroke-width', '0.7');
    poly.setAttribute('class', 'dept');
    poly.setAttribute('data-name', d.n);
    svg.appendChild(poly);

    // Label del departamento (centroide aproximado)
    const avgLat = d.pts.reduce((s, p) => s + p[0], 0) / d.pts.length;
    const avgLng = d.pts.reduce((s, p) => s + p[1], 0) / d.pts.length;
    const [lx, ly] = project(avgLat, avgLng);
    const txt = document.createElementNS(NS, 'text');
    txt.setAttribute('x', lx.toFixed(1));
    txt.setAttribute('y', ly.toFixed(1));
    txt.setAttribute('class', 'dept-label');
    txt.setAttribute('text-anchor', 'middle');
    txt.setAttribute('dominant-baseline', 'central');
    txt.textContent = d.n.toUpperCase().slice(0, 8);
    svg.appendChild(txt);
  });

  document.getElementById('svg-stage').appendChild(svg);
}

// ── PAN & ZOOM ─────────────────────────────────────────────────────────────
let tx = 0, ty = 0, scale = 1;
let dragging = false, startX = 0, startY = 0, startTx = 0, startTy = 0;
const SCALE_MIN = 0.5, SCALE_MAX = 8;

function applyTransform() {
  document.getElementById('svg-stage').style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  document.getElementById('zoomVal').textContent = scale.toFixed(1) + 'x';
  updateMarkersPosition();
}

function fitMap() {
  const mc = document.getElementById('map-container');
  const cw = mc.clientWidth, ch = mc.clientHeight;
  const margin = 40;
  const sx = (cw - margin * 2) / SVG_W;
  const sy = (ch - margin * 2) / SVG_H;
  scale = Math.min(sx, sy, 1);
  tx = (cw - SVG_W * scale) / 2;
  ty = (ch - SVG_H * scale) / 2;
  applyTransform();
}

const mc = document.getElementById('map-container');

mc.addEventListener('mousedown', e => {
  if (e.target.closest('.mk')) return;
  dragging = true; startX = e.clientX; startY = e.clientY;
  startTx = tx; startTy = ty;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx = startTx + (e.clientX - startX);
  ty = startTy + (e.clientY - startY);
  applyTransform();
});
window.addEventListener('mouseup', () => { dragging = false; });

mc.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = mc.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  const newScale = Math.min(SCALE_MAX, Math.max(SCALE_MIN, scale * delta));
  tx = mx - (mx - tx) * (newScale / scale);
  ty = my - (my - ty) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, { passive: false });

// Touch
let lastDist = 0, touchSX = 0, touchSY = 0, touchSTx = 0, touchSTy = 0;
mc.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    touchSX = e.touches[0].clientX; touchSY = e.touches[0].clientY;
    touchSTx = tx; touchSTy = ty; dragging = true;
  } else if (e.touches.length === 2) {
    dragging = false;
    lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
});
mc.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    tx = touchSTx + (e.touches[0].clientX - touchSX);
    ty = touchSTy + (e.touches[0].clientY - touchSY);
    applyTransform();
  } else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const delta = d / lastDist;
    scale = Math.min(SCALE_MAX, Math.max(SCALE_MIN, scale * delta));
    lastDist = d; applyTransform();
  }
}, { passive: false });
mc.addEventListener('touchend', () => { dragging = false; });

document.getElementById('zIn').onclick  = () => { scale = Math.min(SCALE_MAX, scale * 1.25); applyTransform(); };
document.getElementById('zOut').onclick = () => { scale = Math.max(SCALE_MIN, scale / 1.25); applyTransform(); };
document.getElementById('zFit').onclick = fitMap;

// ── MARCADORES ─────────────────────────────────────────────────────────────
const markers = new Map();
const markerPts = [];
const COLORS = ['', 'mg', 'gn'];

function updateMarkersPosition() {
  const rect = mc.getBoundingClientRect();
  markers.forEach((m, key) => {
    const [svgX, svgY] = m.svgPos;
    const screenX = svgX * scale + tx + rect.left;
    const screenY = svgY * scale + ty + rect.top;
    m.el.style.left = screenX + 'px';
    m.el.style.top  = screenY + 'px';
  });
}

function addGroupMarker(locationKey, lat, lng, profiles) {
  const key = 'g:' + locationKey;
  const [svgX, svgY] = project(lat, lng);
  const rect = mc.getBoundingClientRect();

  let el;
  if (markers.has(key)) {
    el = markers.get(key).el;
    markers.get(key).profiles = profiles;
  } else {
    el = document.createElement('div');
    el.className = 'mk ' + COLORS[markers.size % COLORS.length];
    const dot = document.createElement('div');
    dot.className = 'mk-dot';
    el.appendChild(dot);
    el.style.position = 'fixed';
    document.body.appendChild(el);

    el.addEventListener('click', () => showPopup(key, el));
    markers.set(key, { el, svgPos: [svgX, svgY], profiles });
    markerPts.push({ lat, lng });
    spawnArcs(markerPts);

    const count = markers.size;
    document.getElementById('markerCount').textContent = count;
    document.getElementById('markerCountBar').textContent = count;
  }

  const screenX = svgX * scale + tx + rect.left;
  const screenY = svgY * scale + ty + rect.top;
  el.style.left = screenX + 'px';
  el.style.top  = screenY + 'px';
}

// ── POPUP ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function showPopup(key, el) {
  const data = markers.get(key);
  if (!data) return;
  const profiles = data.profiles;

  const items = profiles.map(p => {
    const av = p.photo && (typeof p.photo === 'string' ? p.photo : p.photo?.url);
    const nm = esc(((p.firstName || '') + ' ' + (p.lastName || '')).trim() || p.name || p.email || 'Usuario');
    const lo = esc(p.city || p.country || p.location || p.locality || '');
    const avHtml = av
      ? `<div class="pu-av"><img src="${esc(av)}" alt="${nm}"></div>`
      : `<div class="pu-av">${nm.charAt(0).toUpperCase()}</div>`;
    return `<div class="pu-row">${avHtml}<div><div class="pu-name">${nm}</div>${lo ? `<div class="pu-loc">${lo}</div>` : ''}</div></div>`;
  }).join('');

  document.getElementById('popupContent').innerHTML =
    `<div class="pu-header">${profiles.length} registro${profiles.length !== 1 ? 's' : ''}</div>${items}`;

  const popup = document.getElementById('popup');
  popup.classList.add('show');

  const er = el.getBoundingClientRect();
  let left = er.left + 20, top = er.top - 10;
  if (left + 290 > window.innerWidth) left = er.left - 290;
  if (top + 200 > window.innerHeight) top = window.innerHeight - 210;
  popup.style.left = left + 'px';
  popup.style.top  = Math.max(50, top) + 'px';
}

document.getElementById('popupClose').onclick = () =>
  document.getElementById('popup').classList.remove('show');

document.addEventListener('click', e => {
  if (!e.target.closest('#popup') && !e.target.closest('.mk'))
    document.getElementById('popup').classList.remove('show');
});

// ── ARC CANVAS ────────────────────────────────────────────────────────────
const arcCanvas = document.getElementById('arc-canvas');
const ctx = arcCanvas.getContext('2d');
const arcs = [];

function resizeCanvas() {
  arcCanvas.width  = mc.clientWidth;
  arcCanvas.height = mc.clientHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const ARC_COLS = [
  {r:0,g:229,b:255},{r:0,g:255,b:136},{r:255,g:0,b:110},{r:255,g:170,b:0}
];

function projectScreen(lat, lng) {
  const [svgX, svgY] = project(lat, lng);
  return { x: svgX * scale + tx, y: svgY * scale + ty };
}

function createArc(a, b) {
  const col = ARC_COLS[Math.floor(Math.random() * ARC_COLS.length)];
  return { from: a, to: b, progress: 0, speed: 0.003 + Math.random() * 0.005, color: col, alpha: 0, trail: [], maxTrail: 35 + Math.floor(Math.random() * 25) };
}

function spawnArcs(pts) {
  if (pts.length < 2) return;
  for (let i = 0; i < Math.min(pts.length * 2, 10); i++) {
    const a = pts[Math.floor(Math.random() * pts.length)];
    const b = pts[Math.floor(Math.random() * pts.length)];
    if (a !== b) arcs.push(createArc(a, b));
  }
}

function drawArcs() {
  ctx.clearRect(0, 0, arcCanvas.width, arcCanvas.height);
  for (let i = arcs.length - 1; i >= 0; i--) {
    const arc = arcs[i];
    arc.progress += arc.speed;
    if (arc.progress < 0.1) arc.alpha = arc.progress / 0.1;
    else if (arc.progress > 0.85) arc.alpha = (1 - arc.progress) / 0.15;
    else arc.alpha = 1;
    if (arc.progress >= 1) { arcs.splice(i, 1); continue; }

    const pA = projectScreen(arc.from.lat, arc.from.lng);
    const pB = projectScreen(arc.to.lat,   arc.to.lng);
    const mx = (pA.x + pB.x) / 2, my = (pA.y + pB.y) / 2;
    const dist = Math.hypot(pB.x - pA.x, pB.y - pA.y);
    const cp = { x: mx, y: my - dist * 0.35 };
    const t = arc.progress;
    const bx = (1-t)*(1-t)*pA.x + 2*(1-t)*t*cp.x + t*t*pB.x;
    const by = (1-t)*(1-t)*pA.y + 2*(1-t)*t*cp.y + t*t*pB.y;

    arc.trail.push({ x: bx, y: by });
    if (arc.trail.length > arc.maxTrail) arc.trail.shift();

    if (arc.trail.length > 1) {
      for (let j = 1; j < arc.trail.length; j++) {
        const ta = j / arc.trail.length;
        const {r,g,b} = arc.color;
        ctx.beginPath();
        ctx.moveTo(arc.trail[j-1].x, arc.trail[j-1].y);
        ctx.lineTo(arc.trail[j].x,   arc.trail[j].y);
        ctx.strokeStyle = `rgba(${r},${g},${b},${ta * arc.alpha * 0.65})`;
        ctx.lineWidth = ta * 1.4;
        ctx.stroke();
      }
      const {r,g,b} = arc.color;
      ctx.beginPath(); ctx.arc(bx, by, 2.5, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${r},${g},${b},${arc.alpha})`; ctx.fill();
      const gr = ctx.createRadialGradient(bx,by,0,bx,by,7);
      gr.addColorStop(0, `rgba(${r},${g},${b},${arc.alpha*0.5})`);
      gr.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.beginPath(); ctx.arc(bx, by, 7, 0, Math.PI*2);
      ctx.fillStyle = gr; ctx.fill();
    }
  }
  requestAnimationFrame(drawArcs);
}
drawArcs();

setInterval(() => {
  if (markerPts.length >= 2 && arcs.length < 16) spawnArcs(markerPts);
}, 2500);

// ── CARGAR PERFILES DESDE API ──────────────────────────────────────────────
async function loadProfiles() {
  const listEl = document.getElementById('profileList');

  let profiles = [];
  try {
    const res = await fetch('/api/profiles');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    profiles = await res.json();
  } catch (e) {
    console.error('Error cargando perfiles:', e);
    listEl.innerHTML = '<div style="font-size:10px;color:var(--red)">Error al conectar con /api/profiles</div>';
    return;
  }

  // Stats
  document.getElementById('statTotal').textContent = profiles.length;
  const withGeo = profiles.filter(p => p.city || p.country || p.location || p.locality);
  document.getElementById('statGeo').textContent   = withGeo.length;
  document.getElementById('statNoGeo').textContent = profiles.length - withGeo.length;
  const pct = profiles.length ? Math.round(withGeo.length / profiles.length * 100) : 0;
  document.getElementById('barTotal').style.width = '100%';
  document.getElementById('barGeo').style.width   = pct + '%';

  // Lista lateral
  const PCOLS = ['var(--cyan)','var(--green)','var(--magenta)','var(--amber)'];
  if (!profiles.length) {
    listEl.innerHTML = '<div style="font-size:10px;color:var(--muted)">Sin perfiles en la BD</div>';
  } else {
    listEl.innerHTML = profiles.slice(0, 12).map((p, i) => {
      const nm = esc(((p.firstName||'')+ ' '+(p.lastName||'')).trim() || p.name || p.email || '—');
      const lo = esc(p.city || p.country || p.location || p.locality || '—');
      return `<div class="profile-entry">
        <div class="profile-dot" style="background:${PCOLS[i%4]};box-shadow:0 0 5px ${PCOLS[i%4]}"></div>
        <div><div class="profile-entry-name">${nm}</div><div class="profile-entry-loc">${lo}</div></div>
      </div>`;
    }).join('');
  }

  // Agrupar por ciudad+país y geocodificar local
  const groups = {};
  let notFound = 0;
  for (const p of profiles) {
    const city    = nrm(p.city    || p.locality  || '');
    const country = nrm(p.country || p.location  || '');
    if (!city && !country) continue;

    const geo = geocodeLocal(city, country);
    if (!geo) { notFound++; continue; }

    const key = geo.nombre + '||' + geo.depto;
    if (!groups[key]) groups[key] = { geo, profiles: [] };
    groups[key].profiles.push(p);
  }

  if (notFound > 0) console.info(`${notFound} perfiles sin match en geocoder local. Amplía el dataset con convert_inei.js.`);

  // Pintar marcadores
  for (const [key, grp] of Object.entries(groups)) {
    addGroupMarker(key, grp.geo.lat, grp.geo.lng, grp.profiles);
  }

  // Fit al primer marcador
  if (markers.size > 0 && markers.size < 4) setTimeout(fitMap, 100);
}
